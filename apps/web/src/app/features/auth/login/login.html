<div class="min-h-screen flex items-center justify-center bg-base-100">
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-96 border p-8 shadow-sm">
      <legend class="fieldset-legend text-lg font-bold px-2">Login</legend>

      @if (errorMessage()) {
        <div class="mb-4 text-error text-sm font-semibold bg-error/10 p-3 rounded-lg border border-error/20">
          {{ errorMessage() }}
        </div>
      }

      <label class="label">Username</label>
      <input type="text" formControlName="username" class="input w-full" placeholder="Username" />
      @if (loginForm.controls.username.invalid && loginForm.controls.username.touched) {
        <span class="text-error text-xs mt-1">Username is required</span>
      }

      <label class="label mt-2">Password</label>
      <input type="password" formControlName="password" class="input w-full" placeholder="Password" />
      
      <button type="submit" [disabled]="loginForm.invalid" class="btn btn-neutral w-full mt-6">Login</button>
      
      <div class="mt-4 text-center text-sm">
        <span class="text-base-content/70">Need an account? </span>
        <a routerLink="/register" class="link link-primary">Register</a>
      </div>
    </fieldset>
  </form>
</div>
