<div class="flex h-screen w-screen overflow-hidden bg-discord-800 text-discord-100">
  <div class="w-18 bg-discord-900 flex flex-col pt-3 items-center shrink-0">
    <app-server-list class="w-full"></app-server-list>
  </div>

  <div class="w-60 bg-discord-850 flex flex-col shrink-0">
    <app-channel-list [serverId]="serverId()" class="h-full"></app-channel-list>
  </div>

  <div class="flex-1 flex flex-col min-w-0">
    <app-chat-area [channelId]="channelId()" class="h-full"></app-chat-area>
  </div>

  <div class="w-60 bg-discord-850 flex flex-col shrink-0">
    <app-member-list class="h-full"></app-member-list>
  </div>
</div>
