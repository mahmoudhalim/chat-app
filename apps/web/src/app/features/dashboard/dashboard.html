<div class="flex h-screen w-screen overflow-hidden bg-base-100 text-base-content">
  <div class="w-[72px] bg-base-300 flex flex-col pt-3 items-center shrink-0 border-r border-base-100">
    <app-server-list class="w-full"></app-server-list>
  </div>

  <div class="w-60 bg-base-200 flex flex-col shrink-0 border-r border-base-300">
    <app-channel-list [serverId]="serverId()" class="h-full"></app-channel-list>
  </div>

  <div class="flex-1 flex flex-col min-w-0 bg-base-100">
    <app-chat-area [channelId]="channelId()" class="h-full"></app-chat-area>
  </div>

  <div class="w-60 bg-base-200 flex flex-col shrink-0 border-l border-base-300">
    <app-member-list [serverId]="serverId()" class="h-full"></app-member-list>
  </div>
</div>
